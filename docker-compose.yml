services:
  movieservice:
    build:
      context: .
      dockerfile: Jurassic.movieserviceapi/Dockerfile
    container_name: jurassic-movieservice
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${MOVIE_API_HOST_PORT:-51811}:${MOVIE_API_CONTAINER_PORT:-18081}"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:${MOVIE_API_CONTAINER_PORT:-18081}
      ConnectionStrings__DefaultConnection: "Host=postgres;Database=jurassic_api;Username=jurassic;Password=jurassic_dev"
      ConnectionStrings__WebConnection: "Host=postgres;Database=jurassic_web;Username=jurassic;Password=jurassic_dev"
      Auth__JwtSigningKey: "docker-dev-only-change-in-production-min-32-chars!"
      # Infinity on the host (see thirdpartyapi.md): localhost inside the container is wrong; use host.docker.internal on Docker Desktop.
      Infinity__WebApiBaseUrl: "http://host.docker.internal:8080"
      Infinity__WebAppBaseUrl: "http://host.docker.internal:8082"

  web:
    build:
      context: .
      dockerfile: Jurassic.webapi/Dockerfile
    container_name: jurassic-web
    restart: unless-stopped
    ports:
      - "${WEB_HOST_PORT:-51444}:8080"
    volumes:
      - jurassic_web_keys:/root/.aspnet/DataProtection-Keys
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ASPNETCORE_HTTP_ONLY: "true"
      MovieApi__BaseUrl: http://movieservice:${MOVIE_API_CONTAINER_PORT:-18081}

  postgres:
    image: postgres:16-alpine
    container_name: jurassic-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: jurassic
      POSTGRES_PASSWORD: jurassic_dev
      POSTGRES_DB: jurassic_api
    ports:
      # Default 55433 avoids clashes with typical local Postgres ports.
      - "${POSTGRES_HOST_PORT:-55433}:5432"
    volumes:
      - jurassic_pgdata:/var/lib/postgresql/data
      - ./apidb/apidb.sql:/schema/apidb.sql:ro
      - ./webdb/webdb.sql:/schema/webdb.sql:ro
      - ./docker/postgres/init/01-init-databases.sh:/docker-entrypoint-initdb.d/01-init-databases.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jurassic -d jurassic_api"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  jurassic_pgdata:
  jurassic_web_keys:
